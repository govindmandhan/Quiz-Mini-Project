<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Quizzes – QuizHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md main-navbar" aria-label="Main navigation">
    <div class="container">
      <a class="navbar-brand" href="home.html">
        <i class="bi bi-patch-question-fill"></i> QuizHub
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="categories.html">Browse Quizzes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="create.html">Create Quiz</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page-content">
    <div class="container">

      <h1 class="page-title mb-1">Browse Quizzes</h1>
      <p class="text-muted mb-4" style="font-size: 0.95rem;">
        Explore quizzes across categories. Click a category to jump to that section.
      </p>

      <!-- Category anchor-link buttons (generated by JS) -->
      <nav class="category-nav" id="categoryNav" aria-label="Category navigation">
      </nav>

      <!-- Quiz sections grouped by category (generated by JS) -->
      <div id="quizSections">
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/categories.js"></script>
</body>
</html>
