<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Quiz – QuizHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md main-navbar" aria-label="Main navigation">
    <div class="container">
      <a class="navbar-brand" href="home.html">
        <i class="bi bi-patch-question-fill"></i> QuizHub
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="home.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="categories.html">Browse Quizzes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="create.html">Create Quiz</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sticky Quiz Header (progress bar + submit) -->
  <div class="quiz-sticky-header" id="quizStickyHeader">
    <div class="container">
      <div class="quiz-sticky-inner">
        <span class="quiz-sticky-title" id="stickyTitle">Loading…</span>
        <span class="quiz-progress-label" id="progressLabel">0 / 0 answered</span>
        <button class="btn btn-primary btn-sm flex-shrink-0"
                id="submitBtn" disabled>Submit</button>
      </div>
      <div class="progress" style="height: 5px;" role="progressbar"
           aria-label="Quiz progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="page-content">
    <div class="container" style="max-width: 720px;">

      <!-- Quiz intro heading (rendered by JS) -->
      <div id="quizIntro"></div>

      <!-- Scrollable questions (rendered by JS) -->
      <div id="quizContent"></div>

      <!-- Result section (hidden until submission) -->
      <div id="resultSection" class="result-section d-none">
        <div id="resultAlert"></div>
        <div class="result-score" id="resultScore"></div>
        <p class="result-subtitle" id="resultSubtitle"></p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
          <button class="btn btn-primary" id="restartBtn">
            <i class="bi bi-arrow-clockwise me-1"></i> Try Again
          </button>
          <a href="categories.html" class="btn btn-outline-secondary">
            <i class="bi bi-grid me-1"></i> Browse Quizzes
          </a>
        </div>
      </div>

      <!-- Error state (shown when quiz not found) -->
      <div id="errorSection" class="state-block d-none">
        <i class="bi bi-exclamation-circle"></i>
        <h2>Quiz Not Found</h2>
        <p>The quiz you're looking for doesn't exist or may have been removed.</p>
        <a href="categories.html" class="btn btn-primary mt-2">Browse Quizzes</a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
